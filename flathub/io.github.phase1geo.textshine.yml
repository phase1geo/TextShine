# This is the same ID that you've used in meson.build and other files
app-id: io.github.phase1geo.textshine

# Instead of manually specifying a long list of build and runtime dependencies,
# we can use a convenient pre-made runtime and SDK. For this example, we'll be
# using the runtime and SDK provided by elementary.
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk

# This should match the exec line in your .desktop file and usually is the same
# as your app ID
command: io.github.phase1geo.textshine

# Here we can specify the kinds of permissions our app needs to run. Since we're
# not using hardware like webcams, making sound, or reading external files, we
# only need permission to draw our app on screen using either X11 or Wayland.
finish-args:
  - '--share=ipc'
  - '--socket=fallback-x11'
  - '--socket=wayland'
  - '--filesystem=home'
  - '--device=dri'

#build-options:
#  append-path: /usr/bin
  
# This section is where you list all the source code required to build your app.
# If we had external dependencies that weren't included in our SDK, we would list
# them here.
modules:
  - name: libmarkdown
    buildsystem: simple
    build-commands:
      - ./configure.sh --shared --prefix=/app --pkg-config
      - make -j${FLATPAK_BUILDER_N_JOBS}
      - sed -e 's|/sbin/ldconfig|/sbin/ldconfig -n|' -i librarian.sh
      - make install
    sources:
      - type: archive
        url: https://github.com/Orc/discount/archive/refs/tags/v2.2.4.tar.gz
        sha256: 918905377e6ed3d0a7158cac0a4a18ed3c4cc0cad8ee95dddd82cb86ba9dd044

  - name: gtksourceview
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/GNOME/gtksourceview.git
        tag: '5.12.0'

  - name: intltool
    buildsystem: autotools
    sources:
      - type: archive
        url: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
        sha256: 67c74d94196b153b774ab9f89b2fa6c6ba79352407037c8c14d5aeb334e959cd

  - name: gtkspell
    config-opts:
      - --disable-gtk-doc
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/gtkspell/gtkspell3-3.0.10.tar.xz
        sha256: b040f63836b347eb344f5542443dc254621805072f7141d49c067ecb5a375732
    post-install:
      - install -p -D -m 0644 "COPYING" -t "${FLATPAK_DEST}/share/licenses/gtkspell/";
        #    modules:
        #      - shared-modules/intltool/intltool-0.51.json


  - name: sassc
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/sass/sassc/archive/3.6.2.tar.gz
        sha256: 608dc9002b45a91d11ed59e352469ecc05e4f58fc1259fc9a9f5b8f0f8348a03
      - type: script
        dest-filename: autogen.sh
        commands:
          - autoreconf -si
    modules:
      - name: libsass
        buildsystem: autotools
        sources:
          - type: archive
            url: https://github.com/sass/libsass/archive/3.6.5.tar.gz
            sha256: 89d8f2c46ae2b1b826b58ce7dde966a176bac41975b82e84ad46b01a55080582
          - type: script
            dest-filename: autogen.sh
            commands:
              - autoreconf -si

  - name: granite-7
    buildsystem: meson
    config-opts:
      - -Ddocumentation=false
      - -Ddemo=false
      -  --libdir=lib
    cleanup:
      - /share/icons
      - /share/metainfo
    sources:
      - type: archive
        url: https://github.com/elementary/granite/archive/refs/tags/7.6.0.tar.gz
        sha256: 4b4e4f7f86eb3f55116faec42ebd87e04c3e424d82715ecd967ed39540dca5ef
        
  - name: textshine
    buildsystem: meson
    sources:
      - type: dir
        path: ..
